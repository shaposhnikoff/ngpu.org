{{- $description := .Description | default site.Params.description -}}
<meta name="description" content="{{ $description }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

{{- $opts := dict "transpiler" "libsass" "outputStyle" "compressed" "enableSourceMap" hugo.IsServer -}}
{{- with resources.Get "scss/main.scss" | toCSS $opts | fingerprint -}}
  <link rel="stylesheet" href="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}">
{{- end -}}

<link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">

<meta property="og:title" content="{{ .Title | default site.Title }}">
<meta property="og:description" content="{{ $description }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
{{- with .Params.photo -}}<meta property="og:image" content="{{ . | absURL }}">{{- end -}}
