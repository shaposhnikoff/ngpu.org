{{ $nav := hugo.Data.ngpu_navigation.left }}
{{ with $nav }}
  <nav class="ngpu-panel ngpu-nav-panel">
    <h2>{{ .title }}</h2>
    <ul class="ngpu-nav-list">
      {{ range .items }}
        <li>
          <a href="{{ .url | relURL }}">{{ .label }}</a>
        </li>
      {{ end }}
    </ul>
  </nav>
{{ end }}
